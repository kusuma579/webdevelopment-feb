<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Electronics Search</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #1f4037, #99f2c8);
        min-height: 100vh;
        padding: 30px;
    }

    h1 {
        text-align: center;
        color: white;
        margin-bottom: 25px;
    }

    /* Search Bar */
    .search-box {
        text-align: center;
        margin-bottom: 30px;
    }

    #search {
        width: 60%;
        max-width: 400px;
        padding: 12px;
        border-radius: 25px;
        border: none;
        outline: none;
        font-size: 16px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        transition: 0.3s;
    }

    #search:focus {
        transform: scale(1.05);
    }
    .container {
    display: grid;
    grid-template-columns: repeat(4, 1fr); 
    gap: 20px;
    }
    .card {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        transition: 0.3s;
        text-align: center;
    }

    .card:hover {
        transform: translateY(-10px) scale(1.05);
    }

    .card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
    }

    .card h3 {
        padding: 15px;
        color: #333;
    }

    #noResult {
        text-align: center;
        color: white;
        font-size: 20px;
        margin-top: 20px;
        display: none;
    }
</style>
</head>

<body>

<h1>🔌 Electronics Search</h1>

<div class="search-box">
    <input type="text" id="search" placeholder="Search electronics...">
</div>

<div class="container" id="items">

    <div class="card">
     <img src="https://images.pexels.com/photos/18105/pexels-photo.jpg">
     <h3>Laptop</h3>
    </div>

    <div class="card">
        <img src="https://images.pexels.com/photos/607812/pexels-photo-607812.jpeg">
        <h3>Smartphone</h3>
    </div>

    <div class="card">
        <img src="https://images.pexels.com/photos/3394650/pexels-photo-3394650.jpeg">
        <h3>Headphones</h3>
    </div>

    <div class="card">
        <img src="https://images.pexels.com/photos/51383/photo-camera-subject-photographer-51383.jpeg">
        <h3>Camera</h3>
    </div>

    <div class="card">
        <img src="https://images.pexels.com/photos/267394/pexels-photo-267394.jpeg">
        <h3>Smartwatch</h3>
    </div>

    <div class="card">
        <img src="https://images.pexels.com/photos/1334597/pexels-photo-1334597.jpeg">
        <h3>Tablet</h3>
    </div>

    <div class="card">
        <img src="https://images.pexels.com/photos/1201996/pexels-photo-1201996.jpeg">
        <h3>Television</h3>
    </div>

    <div class="card">
        <img src="https://images.pexels.com/photos/1649771/pexels-photo-1649771.jpeg">
        <h3>Speaker</h3>
    </div>

</div>

<p id="noResult">❌ No results found</p>

<script>
    const search = document.getElementById("search");
    const cards = document.querySelectorAll(".card");
    const noResult = document.getElementById("noResult");

    search.addEventListener("input", () => {
        let value = search.value.toLowerCase();
        let visibleCount = 0;

        cards.forEach(card => {
            let text = card.innerText.toLowerCase();

            if (text.includes(value)) {
                card.style.display = "block";
                visibleCount++;
            } else {
                card.style.display = "none";
            }
        });

        noResult.style.display = visibleCount === 0 ? "block" : "none";
    });
</script>

</body>
</html>
