<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //date object provides information about time,day,month,year etc
        // syntax=new Date()
        let abc=new Date();
        console.log(abc.getDate());
        console.log(abc.getDay());
        console.log(abc.getMonth());    
        console.log(abc.getFullYear());
        console.log(abc.getHours());    //24hrs format
        console.log(abc.getMinutes());
        console.log(abc.getSeconds());
        console.log(abc.getMilliseconds());
         //getDate() method returns the day of the month (from 1 to 31) for the specified date according to local time.
         //getDay() method returns the day of the week (from 0 to 6) for the specified date according to local time. 0 is Sunday, 1 is Monday and so on.
         //getMonth() method returns the month (from 0 to 11) for the specified date according to local time. 0 is January, 1 is February and so on.
         //getFullYear() method returns the year (four digits for dates between year 1000 and 9999) of the specified date according to local time.
         //getHours() method returns the hour (from 0 to 23) of the specified date according to local time.
         //getMinutes() method returns the minutes (from 0 to 59) of the specified date according to local time.
         //getSeconds() method returns the seconds (from 0 to 59) of the specified date according to local time.
         //getMilliseconds() method returns the milliseconds (from 0 to 999) of the specified date according to local time.
    </script>
</body>
</html>
