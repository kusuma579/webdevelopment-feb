<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        console.log(Math.PI)
        console.log(Math.SQRT2)
        console.log(Math.sqrt(9))
        console.log(Math.pow(2,3))
        console.log(Math.random()*6)
         //math.random will give a random number between 0 and 1, so we multiply it by 6 to get a random number between 0 and 6
        console.log(Math.floor(3.7))
        //math.floor will remove the decimal part and gives the largest integer less than or equal to the given number
        console.log(Math.ceil(3.2))
        //math.ceil will remove the decimal part and gives the smallest integer greater than or equal to the given number
        console.log(Math.round(3.5))
        //math.round will round the number to the nearest integer, if the decimal part is 0.5 or greater, it will round up, otherwise it will round down
        
    </script>
</body>
</html>
