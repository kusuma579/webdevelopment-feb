<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- video - mp4 -->
     <video width="400" height="300" controls autoplay muted loop>
        <source src="https://www.learningcontainer.com/wp-content/uploads/2020/05/sample-mp4-file.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <br>
    <!-- pixels - for images and videos, and points - for text and other elements. The size of multimedia content can be 
    specified in pixels or points, depending on the context and requirements of the design. Pixels are commonly used for 
    images and videos, while points are often used for text and other elements to ensure consistent sizing across different 
    devices and resolutions. -->
    <!-- pixabay - for audio -->
    <audio controls autoplay>
        <source src="https://www.learningcontainer.com/wp-content/uploads/2020/02/Kalimba.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <br>
</body>
</html>
